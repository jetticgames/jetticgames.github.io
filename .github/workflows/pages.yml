name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write version
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          VERSION="${{ github.run_number }}-${SHORT_SHA}"
          echo "window.JETTIC_VERSION = '${VERSION}';" > frontend/public/version.js

      - name: Write backend config from secret
        env:
          FRONTEND_BACKEND_URLS: ${{ secrets.FRONTEND_BACKEND_URLS }}
          FRONTEND_BACKEND_URL: ${{ secrets.FRONTEND_BACKEND_URL }}
        run: |
          RAW="${FRONTEND_BACKEND_URLS}"
          if [ -z "$RAW" ] && [ -n "$FRONTEND_BACKEND_URL" ]; then
            RAW="$FRONTEND_BACKEND_URL"
          fi
          URLS_JSON=$(printf '%s' "$RAW" | tr ',' '\n' | sed 's/[[:space:]]*$//' | sed 's/^[[:space:]]*//' | sed '/^$/d' | sed 's#/*$##' | jq -R . | jq -s .)
          FIRST_URL=$(printf '%s' "$RAW" | tr ',' '\n' | sed 's/[[:space:]]*$//' | sed 's/^[[:space:]]*//' | sed '/^$/d' | head -n 1 | sed 's#/*$##')
          cat > frontend/public/config.js <<EOF
          // Auto-generated during GitHub Pages build from FRONTEND_BACKEND_URLS.
          window.JETTIC_CONFIG = {
            backendUrl: '${FIRST_URL}',
            backendUrls: ${URLS_JSON}
          };
          EOF

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build static site
        working-directory: frontend
        env:
          VITE_BASE_PATH: /
          VITE_API_BASE_URL: ${{ secrets.FRONTEND_BACKEND_URL }}
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4