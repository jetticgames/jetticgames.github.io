<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WaterWall - Game Hub</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <h1>WaterWall</h1>
            </div>
            <div class="nav-controls">
                <div class="category-filters">
                    <button class="filter-btn active" data-category="all">All</button>
                    <button class="filter-btn" data-category="action">Action</button>
                    <button class="filter-btn" data-category="puzzle">Puzzle</button>
                    <button class="filter-btn" data-category="strategy">Strategy</button>
                    <button class="filter-btn" data-category="arcade">Arcade</button>
                </div>
                <div class="search-container">
                    <input type="text" id="searchInput" placeholder="Search games..." />
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main id="mainContent">
        <!-- Homepage Game Grid -->
        <div id="homepage" class="page active">
            <div class="games-grid" id="gamesGrid">
                <!-- Games will be dynamically loaded here -->
            </div>
        </div>

        <!-- Game Page -->
        <div id="gamePage" class="page">
            <div class="game-container">
                <div class="game-main">
                    <iframe id="gameFrame" src="" frameborder="0"></iframe>
                </div>
                <div class="game-sidebar">
                    <h3>Recommended Games</h3>
                    <div id="recommendedGames" class="recommended-list">
                        <!-- Recommended games will be loaded here -->
                    </div>
                </div>
            </div>
            <div class="game-info">
                <div class="game-title-row">
                    <h2 id="gameTitle">Game Title</h2>
                    <div class="game-controls">
                        <label class="proxy-toggle">
                            <input type="checkbox" id="proxyToggle" checked>
                            <span class="toggle-slider"></span>
                            <span class="toggle-label">Proxy</span>
                        </label>
                        <button id="fullscreenBtn" class="control-btn">
                            <span>⛶</span> Fullscreen
                        </button>
                    </div>
                </div>
                <div class="game-description">
                    <p id="gameDescription">Game description will appear here...</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Fullscreen Overlay -->
    <div id="fullscreenOverlay" class="fullscreen-overlay">
        <div class="fullscreen-controls">
            <button id="exitFullscreen" class="control-btn">Exit Fullscreen</button>
        </div>
        <iframe id="fullscreenFrame" src="" frameborder="0"></iframe>
    </div>

    <script src="app.js"></script>
</body>
</html>
