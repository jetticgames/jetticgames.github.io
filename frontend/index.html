<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WaterWall - Ultimate Gaming Platform</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🎮%3C/text%3E%3C/svg%3E">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo-container">
                    <div class="logo-icon">
                        <i class="fas fa-gamepad"></i>
                    </div>
                    <span class="logo-text">WaterWall</span>
                </div>
            </div>
            
            <nav class="sidebar-nav">
                <ul class="nav-list">
                    <li class="nav-item active" data-page="home">
                        <a href="#" class="nav-link">
                            <i class="nav-icon fas fa-home"></i>
                            <span>Home</span>
                        </a>
                    </li>
                    <li class="nav-item" data-page="favorites">
                        <a href="#" class="nav-link">
                            <i class="nav-icon fas fa-heart"></i>
                            <span>Favorites</span>
                        </a>
                    </li>
                </ul>
                
                <ul class="nav-list nav-bottom">
                    <li class="nav-item nav-settings" data-page="settings">
                        <a href="#" class="nav-link">
                            <i class="nav-icon fas fa-cog"></i>
                        </a>
                    </li>
                </ul>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Header -->
            <header class="top-header">
                <div class="header-content">
                    <div class="header-stats">
                        <div class="stat-item">
                            <i class="stat-icon fas fa-gamepad"></i>
                            <span><span data-stat="games">0</span> Games</span>
                        </div>
                        <div class="stat-item">
                            <i class="stat-icon fas fa-folder"></i>
                            <span><span data-stat="categories">0</span> Categories</span>
                        </div>
                        <div class="stat-item">
                            <i class="stat-icon fas fa-users"></i>
                            <span>1000+ Players</span>
                        </div>
                    </div>
                    
                    <div class="header-actions">
                        <div class="search-container">
                            <input type="text" id="searchInput" placeholder="Search games...">
                            <button class="search-btn">
                                <i class="fas fa-search"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </header>

            <!-- Content Area -->
            <div class="content-area">
                <!-- Home Page -->
                <div id="homePage" class="page active">
                    <section id="favoriteGamesSection" class="games-section" style="display:none;">
                        <div class="section-header">
                            <h2 class="section-title"><i class="fas fa-heart" style="color:#e25555;"></i> Your Favorites</h2>
                        </div>
                        <div class="games-grid" id="favoriteGamesGrid"></div>
                    </section>
                    <section class="games-section">
                        <div class="section-header">
                            <h2 class="section-title">All Games</h2>
                            <div id="categoryTabs" class="category-tabs"></div>
                        </div>
                        <div class="games-grid" id="allGames"></div>
                    </section>
                </div>

                <!-- Game Page -->
                <div id="gamePage" class="page">
                    <div class="game-page-container">
                        <div class="game-main-area">
                            <!-- Game Frame Container (height calculated to leave room for controls) -->
                            <div class="game-frame-wrapper">
                                <iframe id="gameFrame" src="" title="Game"></iframe>
                            </div>
                            <!-- Game Info Bar -->
                            <div class="game-info-bottom">
                                <div class="game-info-left">
                                    <h1 id="gameTitle">Game Title</h1>
                                    <span id="gameCategory">Category</span>
                                </div>
                                <div class="game-info-right">
                                    <div class="proxy-toggle-container">
                                        <label class="proxy-toggle-label">
                                            <input type="checkbox" id="proxyToggleGame" checked>
                                            <span class="proxy-toggle-text">Proxy</span>
                                        </label>
                                    </div>
                                    <button class="icon-btn fav-btn" data-action="favorite" title="Add to Favorites">
                                        <i class="fas fa-heart"></i>
                                    </button>
                                    <button class="icon-btn" data-action="fullscreen" title="Fullscreen">
                                        <i class="fas fa-expand"></i>
                                    </button>
                                </div>
                            </div>
                            <!-- Game Description (scrolls separately) -->
                            <div class="game-description">
                                <h3>About this game</h3>
                                <p id="gameDescription">Game description will appear here...</p>
                            </div>
                        </div>
                        
                        <!-- Game Sidebar with Suggestions -->
                        <div class="game-sidebar">
                            <div class="suggested-games">
                                <h3 class="suggested-title">More Games</h3>
                                <div class="suggested-games-list" id="suggestedGames">
                                    <!-- Suggested games will be loaded here -->
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Fullscreen Overlay -->
    <div id="fullscreenOverlay" class="fullscreen-overlay">
        <div class="fullscreen-controls">
            <button class="exit-fullscreen-btn">
                <i class="fas fa-times"></i>
                Exit Fullscreen
            </button>
        </div>
        <iframe id="fullscreenFrame" src="" title="Game Fullscreen"></iframe>
    </div>

    <script src="app.js"></script>
</body>
</html>
