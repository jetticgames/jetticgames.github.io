name = "waterwall-backend"
main = "worker.js"
compatibility_date = "2023-05-18"

# KV Namespaces for backend functionality
[[kv_namespaces]]
binding = "CONFIG_KV"
id = "your-config-kv-namespace-id"
preview_id = "your-config-preview-kv-namespace-id"

[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "your-ratelimit-kv-namespace-id"
preview_id = "your-ratelimit-preview-kv-namespace-id"

[env.production]
name = "waterwall-backend"
routes = [
  { pattern = "yourdomain.com/api/*", zone_name = "yourdomain.com" },
  { pattern = "yourdomain.com/proxy/*", zone_name = "yourdomain.com" }
]

[[env.production.kv_namespaces]]
binding = "CONFIG_KV"
id = "your-production-config-kv-namespace-id"

[[env.production.kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "your-production-ratelimit-kv-namespace-id"

[env.staging]
name = "waterwall-backend-staging"

[[env.staging.kv_namespaces]]
binding = "CONFIG_KV"
id = "your-staging-config-kv-namespace-id"

[[env.staging.kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "your-staging-ratelimit-kv-namespace-id"

# Environment variables
[vars]
ENVIRONMENT = "development"
APP_VERSION = "2.0.0"

[env.production.vars]
ENVIRONMENT = "production"

[env.staging.vars]
ENVIRONMENT = "staging"
